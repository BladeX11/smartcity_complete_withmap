<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Track Complaint | SmartCity</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
:root{--primary:#1a237e;--accent:#00b0ff;--success:#00c853;--warning:#ffab00;--danger:#f44336;
  --dark-bg:#0d1117;--card-bg:#161b22;--card-border:#30363d;--text-primary:#e6edf3;--text-muted:#8b949e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark-bg);color:var(--text-primary);font-family:'Segoe UI',sans-serif;min-height:100vh}
.navbar-custom{background:var(--card-bg);border-bottom:1px solid var(--card-border);padding:14px 0;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text-primary);font-weight:800;font-size:18px}
.brand-logo{width:36px;height:36px;background:linear-gradient(135deg,#1a237e,#1565c0);border-radius:8px;display:flex;align-items:center;justify-content:center}
.search-hero{background:radial-gradient(ellipse at center,rgba(0,176,255,.08) 0%,transparent 70%);border-bottom:1px solid var(--card-border);padding:64px 0 48px;text-align:center}
.search-box{max-width:600px;margin:0 auto}
.search-input-wrap{position:relative;margin-top:24px}
.search-input{background:#0d1117;border:2px solid var(--card-border);color:var(--text-primary);
  border-radius:14px;padding:18px 60px 18px 20px;font-size:16px;width:100%;transition:.2s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,176,255,.1);outline:none}
.search-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:linear-gradient(135deg,#1a237e,#1565c0);border:none;color:#fff;
  padding:10px 18px;border-radius:8px;cursor:pointer;transition:.2s}
.search-btn:hover{opacity:.9}
.page-content{max-width:820px;margin:0 auto;padding:40px 16px}
.card-dark{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:28px;margin-bottom:24px}
/* TIMELINE */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--card-border)}
.tl-item{position:relative;margin-bottom:28px}
.tl-dot{width:22px;height:22px;border-radius:50%;position:absolute;left:-42px;top:2px;
  display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid}
.tl-dot.done{background:rgba(0,200,83,.15);border-color:var(--success);color:var(--success)}
.tl-dot.current{background:rgba(0,176,255,.15);border-color:var(--accent);color:var(--accent);animation:pulse2 2s infinite}
.tl-dot.pending{background:#0d1117;border-color:var(--card-border);color:var(--text-muted)}
@keyframes pulse2{0%,100%{box-shadow:0 0 0 0 rgba(0,176,255,.4)}50%{box-shadow:0 0 0 6px rgba(0,176,255,0)}}
.tl-label{font-weight:700;font-size:14px}
.tl-time{font-size:12px;color:var(--text-muted);margin-top:2px}
.tl-note{font-size:12px;color:var(--text-muted);margin-top:4px;background:#0d1117;padding:6px 10px;border-radius:6px}
/* STATUS */
.big-status{padding:8px 24px;border-radius:30px;font-size:15px;font-weight:700}
.stat-pending  {background:rgba(255,171,0,.12);color:#ffab00;border:1px solid rgba(255,171,0,.3)}
.stat-assigned {background:rgba(124,77,255,.12);color:#7c4dff;border:1px solid rgba(124,77,255,.3)}
.stat-progress {background:rgba(0,176,255,.12);color:#00b0ff;border:1px solid rgba(0,176,255,.3)}
.stat-resolved {background:rgba(0,200,83,.12);color:#00c853;border:1px solid rgba(0,200,83,.3)}
.stat-closed   {background:rgba(139,148,158,.12);color:#8b949e;border:1px solid rgba(139,148,158,.3)}
.stat-rejected {background:rgba(244,67,54,.12);color:#f44336;border:1px solid rgba(244,67,54,.3)}
/* STARS */
.star-row{display:flex;gap:6px;font-size:28px;cursor:pointer;margin:12px 0}
.star{color:var(--card-border);transition:.2s}
.star.lit{color:#ffab00}
.star:hover,.star:hover~.star-row .star{color:#ffab00}
/* DETAIL GRID */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.detail-item .dl{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-item .dv{font-size:14px;font-weight:500}
@media(max-width:600px){.detail-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="navbar-custom">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="../index.html" class="brand">
      <div class="brand-logo"><i class="fa fa-city text-white"></i></div>SmartCity
    </a>
    <div class="d-flex gap-2">
      <a href="submit_complaint.html" class="btn btn-sm" style="background:rgba(0,176,255,.1);color:var(--accent);border:1px solid rgba(0,176,255,.2)"><i class="fa fa-plus me-1"></i>New Complaint</a>
    </div>
  </div>
</nav>

<!-- SEARCH HERO -->
<div class="search-hero">
  <div class="container">
    <div class="search-box">
      <div class="mb-2" style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent)">
        <i class="fa fa-search me-1"></i>Complaint Tracker
      </div>
      <h2 class="fw-bold mb-1" style="font-size:clamp(22px,4vw,36px)">Track Your Complaint</h2>
      <p style="color:var(--text-muted);font-size:15px">Enter your complaint code or email to check real-time status</p>
      <div class="search-input-wrap">
        <input type="text" class="search-input" id="searchInput"
          placeholder="Enter complaint code (e.g. CMP-2024-00042)" onkeydown="if(event.key==='Enter')search()">
        <button class="search-btn" onclick="search()"><i class="fa fa-search"></i></button>
      </div>
      <div class="mt-3" style="font-size:12px;color:var(--text-muted)">
        Demo codes: <span class="demo-code" onclick="loadDemo('CMP-2024-00042')" style="color:var(--accent);cursor:pointer;text-decoration:underline">CMP-2024-00042</span> ·
        <span class="demo-code" onclick="loadDemo('CMP-2024-00015')" style="color:var(--accent);cursor:pointer;text-decoration:underline">CMP-2024-00015</span> ·
        <span class="demo-code" onclick="loadDemo('CMP-2024-00089')" style="color:var(--accent);cursor:pointer;text-decoration:underline">CMP-2024-00089</span>
      </div>
    </div>
  </div>
</div>

<div class="page-content" id="mainContent">
  <div class="text-center py-5" style="color:var(--text-muted)">
    <i class="fa fa-search fa-3x mb-3 d-block" style="opacity:.3"></i>
    <p>Enter a complaint code above to track its status</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script>
const API_BASE = 'http://127.0.0.1:5000';
const DEMO = {
  'CMP-2024-00042':{
    code:'CMP-2024-00042',title:'Sewage overflow blocking residential lane',
    description:'A drainage pipe has burst near Lane 4, causing sewage to overflow onto the road. The smell is unbearable and there is a health risk to residents.',
    status:'in_progress',category:'Sewage Overflow',area:'Bibwewadi, W09 · South Zone',
    department:'Water & Utilities',officer:'Util Officer 1',priority:'Critical',priorityColor:'#dc3545',
    submitted:'2024-11-14 09:23 AM',assigned:'2024-11-14 11:30 AM',
    address:'Near Lane 4, Bibwewadi Main Road',age:38,sla:4,
    history:[
      {status:'Submitted',time:'Nov 14, 9:23 AM',note:'Complaint received and logged',done:true},
      {status:'Assigned',time:'Nov 14, 11:30 AM',note:'Assigned to Util Officer 1',done:true},
      {status:'In Progress',time:'Nov 14, 2:00 PM',note:'Officer visited site, repair team dispatched',done:false,current:true},
      {status:'Resolved',time:'Pending',note:'Awaiting resolution',done:false},
    ]
  },
  'CMP-2024-00015':{
    code:'CMP-2024-00015',title:'Water pipe burst near primary school',
    description:'A water main has burst near the school junction, causing significant waterlogging and disrupting morning traffic and school buses.',
    status:'resolved',category:'Water Leakage / Pipeline',area:'Hadapsar, W03 · East Zone',
    department:'Water & Utilities',officer:'Util Officer 2',priority:'Critical',priorityColor:'#dc3545',
    submitted:'2024-11-10 07:15 AM',assigned:'2024-11-10 08:00 AM',resolved:'2024-11-10 1:00 PM',
    address:'Near City Primary School, Hadapsar Main Rd',age:6,sla:4,
    history:[
      {status:'Submitted',time:'Nov 10, 7:15 AM',note:'Complaint received',done:true},
      {status:'Assigned',time:'Nov 10, 8:00 AM',note:'Assigned to emergency repair team',done:true},
      {status:'In Progress',time:'Nov 10, 9:30 AM',note:'Repair team on site, pipe section replaced',done:true},
      {status:'Resolved',time:'Nov 10, 1:00 PM',note:'Pipe fully repaired, road cleared. Resolved in 6h.',done:true},
    ]
  },
  'CMP-2024-00089':{
    code:'CMP-2024-00089',title:'Large pothole causing vehicle damage near market',
    description:'A 2-foot wide pothole has formed near the main market junction. Multiple vehicles have been damaged including a school bus today.',
    status:'pending',category:'Pothole / Road Damage',area:'Shivajinagar, W05 · Central Zone',
    department:'Engineering & Roads',officer:null,priority:'High',priorityColor:'#fd7e14',
    submitted:'2024-11-13 03:30 PM',address:'Near Main Market Junction, FC Road',age:31,sla:24,
    history:[
      {status:'Submitted',time:'Nov 13, 3:30 PM',note:'Complaint received',done:true},
      {status:'Assigned',time:'Pending',note:'Awaiting assignment to field officer',done:false,current:true},
      {status:'In Progress',time:'—',note:'',done:false},
      {status:'Resolved',time:'—',note:'',done:false},
    ]
  }
};

let currentRating = 0;

function fmtDate(v){
  if(!v) return '—';
  const d = new Date(v);
  if (isNaN(d.getTime())) return String(v);
  return d.toLocaleString();
}

function mapComplaint(api){
  const submitted = new Date(api.submitted_at);
  const now = new Date();
  const ageHours = submitted instanceof Date && !isNaN(submitted.getTime())
    ? Math.max(0, Math.round((now - submitted) / 3600000))
    : Number(api.age_hours || 0);

  const historyRows = Array.isArray(api.status_history) ? api.status_history : [];
  const history = historyRows.map((h, idx) => ({
    status: (h.new_status || '').replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase()) || 'Updated',
    time: fmtDate(h.updated_at),
    note: h.remarks || '',
    done: idx < historyRows.length - 1
  }));

  if (!history.length) {
    history.push(
      { status: 'Submitted', time: fmtDate(api.submitted_at), note: 'Complaint received and logged', done: api.status !== 'pending' },
      { status: 'Assigned', time: api.assigned_at ? fmtDate(api.assigned_at) : 'Pending', note: '', done: ['assigned', 'in_progress', 'resolved', 'closed'].includes(api.status), current: api.status === 'assigned' },
      { status: 'In Progress', time: '—', note: '', done: ['in_progress', 'resolved', 'closed'].includes(api.status), current: api.status === 'in_progress' },
      { status: 'Resolved', time: api.resolved_at ? fmtDate(api.resolved_at) : 'Pending', note: '', done: ['resolved', 'closed'].includes(api.status), current: api.status === 'resolved' }
    );
  } else if (!history.some(h => h.current) && history.length) {
    history[history.length - 1].current = true;
  }

  return {
    recordType: 'complaint',
    code: api.complaint_code,
    title: api.title || 'Complaint',
    description: api.description || '',
    status: api.status || 'pending',
    category: api.cat_name || 'N/A',
    area: `${api.area_name || 'N/A'}${api.ward_number ? `, W${api.ward_number}` : ''}${api.zone ? ` · ${api.zone}` : ''}`,
    department: api.dept_name || 'N/A',
    officer: api.officer_name || null,
    priority: api.priority_name || 'Medium',
    priorityColor: api.color_code || '#00b0ff',
    submitted: fmtDate(api.submitted_at),
    assigned: fmtDate(api.assigned_at),
    resolved: fmtDate(api.resolved_at),
    address: api.address_detail || 'Not provided',
    age: ageHours,
    sla: Number(api.sla_hours || 24),
    history
  };
}

function mapCrime(api){
  const submitted = new Date(api.created_at || api.incident_date);
  const now = new Date();
  const ageHours = submitted instanceof Date && !isNaN(submitted.getTime())
    ? Math.max(0, Math.round((now - submitted) / 3600000))
    : 0;

  const timeline = [
    { status: 'Reported', time: fmtDate(api.created_at || api.incident_date), note: 'Incident report received', done: true },
    { status: 'FIR Filed', time: api.status === 'fir_filed' || api.fir_number ? 'Updated' : 'Pending', note: api.fir_number ? `FIR: ${api.fir_number}` : '', done: ['fir_filed', 'under_investigation', 'chargesheet', 'resolved'].includes(api.status), current: api.status === 'fir_filed' },
    { status: 'Under Investigation', time: ['under_investigation', 'chargesheet', 'resolved'].includes(api.status) ? 'Updated' : 'Pending', note: api.assigned_station ? `Station: ${api.assigned_station}` : '', done: ['under_investigation', 'chargesheet', 'resolved'].includes(api.status), current: api.status === 'under_investigation' },
    { status: 'Resolved', time: api.status === 'resolved' ? 'Updated' : 'Pending', note: '', done: api.status === 'resolved', current: api.status === 'resolved' }
  ];

  return {
    recordType: 'crime',
    code: api.incident_code,
    title: api.type_name ? `${api.type_name} incident reported` : 'Crime Incident',
    description: api.description || '',
    status: api.status || 'reported',
    category: api.type_name || 'Crime Report',
    area: `${api.area_name || 'N/A'}${api.ward_number ? `, ${api.ward_number}` : ''}${api.zone ? ` · ${api.zone}` : ''}`,
    department: api.assigned_station || 'Public Safety',
    officer: null,
    priority: (api.severity || 'moderate').toUpperCase(),
    priorityColor: api.color_hex || '#ff3d5a',
    submitted: fmtDate(api.created_at || api.incident_date),
    assigned: '—',
    resolved: '—',
    address: api.address_detail || 'Not provided',
    age: ageHours,
    sla: 48,
    history: timeline
  };
}

async function loadComplaint(code){
  try {
    const listRes = await fetch(`${API_BASE}/api/complaints?search=${encodeURIComponent(code)}&limit=50&page=1`, {
      credentials: 'include'
    });
    if (listRes.status === 401) {
      throw new Error('LOGIN_REQUIRED');
    }
    const listJson = await listRes.json();
    if (!listRes.ok || !listJson.success) throw new Error(listJson.error || 'Failed to fetch complaints');

    const rows = listJson?.data?.complaints || [];
    const found = rows.find(r => String(r.complaint_code || '').toUpperCase() === code);
    if (!found) return false;

    const detailRes = await fetch(`${API_BASE}/api/complaints/${found.complaint_id}`, { credentials: 'include' });
    const detailJson = await detailRes.json();
    if (!detailRes.ok || !detailJson.success) throw new Error(detailJson.error || 'Failed to fetch complaint details');

    render(mapComplaint(detailJson.data));
    return true;
  } catch (e) {
    if (String(e.message) === 'LOGIN_REQUIRED') {
      document.getElementById('mainContent').innerHTML = `
        <div class="text-center py-5">
          <i class="fa fa-lock fa-3x mb-3 d-block" style="color:var(--warning);opacity:.8"></i>
          <h5 class="fw-bold">Login Required</h5>
          <p style="color:var(--text-muted)">Please login first to track your submitted complaints.</p>
          <a href="../index.html" class="btn btn-sm" style="background:rgba(0,176,255,.1);color:var(--accent);border:1px solid rgba(0,176,255,.2)">Go to Login</a>
        </div>`;
      return true;
    }
    return false;
  }
}

async function loadCrime(code){
  try {
    const listRes = await fetch(`${API_BASE}/api/crimes?days=3650`, { credentials: 'include' });
    if (listRes.status === 401) throw new Error('LOGIN_REQUIRED');
    const listJson = await listRes.json();
    if (!listRes.ok || !listJson.success) throw new Error(listJson.error || 'Failed to fetch crimes');
    const rows = listJson?.data || [];
    const found = rows.find(r => String(r.incident_code || '').toUpperCase() === code);
    if (!found) return false;

    const detailRes = await fetch(`${API_BASE}/api/crimes/${found.incident_id}`, { credentials: 'include' });
    const detailJson = await detailRes.json();
    if (!detailRes.ok || !detailJson.success) throw new Error(detailJson.error || 'Failed to fetch crime details');

    render(mapCrime(detailJson.data));
    return true;
  } catch (e) {
    if (String(e.message) === 'LOGIN_REQUIRED') {
      document.getElementById('mainContent').innerHTML = `
        <div class="text-center py-5">
          <i class="fa fa-lock fa-3x mb-3 d-block" style="color:var(--warning);opacity:.8"></i>
          <h5 class="fw-bold">Login Required</h5>
          <p style="color:var(--text-muted)">Please login first to track your submitted records.</p>
          <a href="../index.html" class="btn btn-sm" style="background:rgba(0,176,255,.1);color:var(--accent);border:1px solid rgba(0,176,255,.2)">Go to Login</a>
        </div>`;
      return true;
    }
    return false;
  }
}

async function search(){
  const code = document.getElementById('searchInput').value.trim().toUpperCase();
  if(!code){alert('Please enter a complaint code');return}
  const foundLive = code.startsWith('CRM-')
    ? await loadCrime(code)
    : await loadComplaint(code);
  if (!foundLive) loadDemo(code);
}

async function loadDemo(code){
  document.getElementById('searchInput').value = code;
  const normalized = String(code).toUpperCase();
  const foundLive = normalized.startsWith('CRM-')
    ? await loadCrime(normalized)
    : await loadComplaint(normalized);
  if (foundLive) return;
  const c = DEMO[code];
  if(!c){
    document.getElementById('mainContent').innerHTML = `
      <div class="text-center py-5">
        <i class="fa fa-circle-xmark fa-3x mb-3 d-block" style="color:var(--danger);opacity:.6"></i>
        <h5 class="fw-bold">Complaint Not Found</h5>
        <p style="color:var(--text-muted)">No complaint with code <strong style="color:var(--accent)">${code}</strong> was found.</p>
        <p style="font-size:12px;color:var(--text-muted)">Try: CMP-2024-00042, CMP-2024-00015, or CMP-2024-00089</p>
      </div>`;
    return;
  }
  render(c);
}

function render(c){
  const slaBreached = c.status !== 'resolved' && c.age > c.sla;
  const statusClass = {pending:'stat-pending',assigned:'stat-assigned',in_progress:'stat-progress',
                       resolved:'stat-resolved',closed:'stat-closed',rejected:'stat-rejected',
                       reported:'stat-pending',fir_filed:'stat-assigned',
                       under_investigation:'stat-progress',chargesheet:'stat-assigned'};

  document.getElementById('mainContent').innerHTML = `
    <!-- STATUS HEADER -->
    <div class="card-dark">
      <div class="d-flex align-items-start justify-content-between flex-wrap gap-3">
        <div>
          <div style="font-family:monospace;font-size:13px;color:var(--accent);font-weight:700;margin-bottom:8px">
            <i class="fa fa-hashtag me-1"></i>${c.code}
          </div>
          <h4 class="fw-bold mb-2">${c.title}</h4>
          <div class="d-flex flex-wrap gap-2 align-items-center">
            <span class="big-status ${statusClass[c.status]}">${c.status.replace('_',' ')}</span>
            <span style="background:rgba(255,255,255,.06);padding:4px 12px;border-radius:20px;font-size:13px">
              <span style="width:8px;height:8px;border-radius:50%;background:${c.priorityColor};display:inline-block;margin-right:6px"></span>${c.priority} Priority
            </span>
            ${slaBreached?`<span style="background:rgba(244,67,54,.1);color:#f44336;padding:4px 12px;border-radius:20px;font-size:12px;border:1px solid rgba(244,67,54,.2)"><i class="fa fa-triangle-exclamation me-1"></i>SLA Breached</span>`:''}
          </div>
        </div>
        <div class="text-end">
          <div style="font-size:11px;color:var(--text-muted)">Submitted</div>
          <div style="font-weight:700;font-size:14px">${c.submitted}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Age: <strong>${c.age}h</strong> of ${c.sla}h SLA</div>
        </div>
      </div>
      <div class="mt-3 pt-3" style="border-top:1px solid var(--card-border)">
        <div style="font-size:13px;color:var(--text-muted)">${c.description}</div>
      </div>
    </div>

    <!-- DETAIL GRID -->
    <div class="card-dark">
      <h6 class="fw-bold mb-4"><i class="fa fa-info-circle me-2" style="color:var(--accent)"></i>${c.recordType === 'crime' ? 'Crime Details' : 'Complaint Details'}</h6>
      <div class="detail-grid">
        <div class="detail-item"><div class="dl">Category</div><div class="dv">${c.category}</div></div>
        <div class="detail-item"><div class="dl">Department</div><div class="dv">${c.department}</div></div>
        <div class="detail-item"><div class="dl">Location</div><div class="dv">${c.area}</div></div>
        <div class="detail-item"><div class="dl">Address</div><div class="dv">${c.address}</div></div>
        <div class="detail-item"><div class="dl">Assigned Officer</div><div class="dv">${c.officer||'<span style="color:var(--text-muted)">Not yet assigned</span>'}</div></div>
        <div class="detail-item"><div class="dl">Resolution Target</div><div class="dv">${c.sla} hours (${c.priority} SLA)</div></div>
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="card-dark">
      <h6 class="fw-bold mb-4"><i class="fa fa-timeline me-2" style="color:var(--accent)"></i>Status Timeline</h6>
      <div class="timeline">
        ${c.history.map(h=>`
          <div class="tl-item">
            <div class="tl-dot ${h.done?'done':h.current?'current':'pending'}">
              <i class="fa fa-${h.done?'check':h.current?'spinner fa-spin':'circle'}"></i>
            </div>
            <div class="tl-label" style="color:${h.done?'var(--success)':h.current?'var(--accent)':'var(--text-muted)'}">${h.status}</div>
            <div class="tl-time">${h.time}</div>
            ${h.note?`<div class="tl-note">${h.note}</div>`:''}
          </div>`).join('')}
      </div>
    </div>

    ${c.status==='resolved' && c.recordType !== 'crime'?`
    <!-- FEEDBACK -->
    <div class="card-dark">
      <h6 class="fw-bold mb-3"><i class="fa fa-star me-2" style="color:var(--warning)"></i>Rate Resolution Quality</h6>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">How satisfied are you with how this was resolved?</p>
      <div class="star-row" id="starRow">
        ${[1,2,3,4,5].map(n=>`<span class="star" data-val="${n}" onclick="setRating(${n})">★</span>`).join('')}
      </div>
      <textarea id="feedbackText" placeholder="Optional comment..." class="form-control mt-2"
        style="background:#0d1117;border:1px solid var(--card-border);color:var(--text-primary);border-radius:8px;padding:10px;width:100%;resize:vertical;min-height:80px;font-size:13px"></textarea>
      <button onclick="submitFeedback()" class="btn btn-sm mt-3" style="background:rgba(0,200,83,.1);color:var(--success);border:1px solid rgba(0,200,83,.2)">
        <i class="fa fa-paper-plane me-1"></i>Submit Feedback
      </button>
    </div>`:''}

    <div class="d-flex gap-3 mt-2">
      <a href="submit_complaint.html" class="btn btn-sm" style="background:rgba(0,176,255,.1);color:var(--accent);border:1px solid rgba(0,176,255,.2)">
        <i class="fa fa-plus me-1"></i>New Complaint
      </a>
      <button class="btn btn-sm btn-outline-secondary" onclick="window.print()">
        <i class="fa fa-print me-1"></i>Print
      </button>
    </div>
  `;
}

function setRating(n){
  currentRating = n;
  document.querySelectorAll('.star').forEach((el,i)=>{
    el.classList.toggle('lit', i < n);
  });
}

function submitFeedback(){
  if(!currentRating){alert('Please select a star rating');return}
  const comment = document.getElementById('feedbackText').value;
  alert(`Thank you! Rating: ${currentRating}★\n${comment?'Comment: '+comment:''}\n\n(Feedback saved to database in live mode)`);
  document.querySelector('.card-dark:last-of-type').innerHTML =
    '<div class="text-center py-3"><i class="fa fa-check-circle fa-2x mb-2" style="color:var(--success)"></i><br><strong>Feedback submitted. Thank you!</strong></div>';
}
</script>
</body>
</html>
